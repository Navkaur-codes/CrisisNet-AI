<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrisisNet AI</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Main Application Container -->
    <div class="app-container">
        
        <!-- Sidebar Dashboard -->
        <aside class="dashboard-panel">
            <header class="dashboard-header">
                <div class="brand">
                    <i class="fa-solid fa-shield-heart pulse-icon"></i>
                    <h1>CrisisNet AI</h1>
                </div>
                <div class="header-actions">
                    <button id="demo-btn" class="btn btn-secondary"><i class="fa-solid fa-bolt"></i> Demo Load</button>
                    <div class="system-status online"><span class="dot"></span> System Active</div>
                </div>
            </header>

            <div class="queue-stats">
                <div class="stat-box critical">
                    <span id="stat-critical">0</span>
                    <label>Critical</label>
                </div>
                <div class="stat-box medium">
                    <span id="stat-medium">0</span>
                    <label>Medium</label>
                </div>
                <div class="stat-box low">
                    <span id="stat-low">0</span>
                    <label>Low</label>
                </div>
            </div>

            <div class="alert-queue">
                <div class="queue-header">
                    <h2>Active Alerts</h2>
                    <span class="sort-indicator">Sorted by Priority <i class="fa-solid fa-arrow-down-wide-short"></i></span>
                </div>
                <div id="alerts-list" class="alerts-list">
                    <!-- Alerts will be injected here -->
                    <div class="empty-state">
                        <i class="fa-regular fa-bell-slash"></i>
                        <p>No active emergencies</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Map View -->
        <main class="map-panel">
            <div id="map"></div>
        </main>

        <!-- Floating SOS Button -->
        <button id="sos-trigger" class="sos-trigger">
            <span class="pulse-ring"></span>
            <i class="fa-solid fa-triangle-exclamation"></i>
            SOS
        </button>
    </div>

    <!-- SOS Modal Overlay -->
    <div id="sos-modal" class="modal-overlay hidden">
        <div class="modal-content sos-panel">
            <div class="modal-header">
                <h2>Emergency Report</h2>
                <button id="close-sos" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div id="sos-step-1">
                    <p class="instruction">Tap the large button and describe your emergency.</p>
                    <button id="record-btn" class="big-record-btn">
                        <i class="fa-solid fa-microphone"></i>
                        <span>Hold to Speak</span>
                    </button>
                    <div class="text-fallback">
                        <p>Or type your message:</p>
                        <textarea id="sos-text" placeholder="E.g. Fire in the lobby, someone is hurt..."></textarea>
                    </div>
                    <button id="submit-sos" class="btn btn-primary btn-large">Send Alert Now</button>
                </div>
                <div id="sos-step-2" class="hidden">
                    <div class="success-animation">
                        <i class="fa-solid fa-circle-check"></i>
                    </div>
                    <h3>Help is being coordinated</h3>
                    <p>Security and responders have been notified with your exact location.</p>
                    <p class="ai-insight-preview"></p>
                    <button id="dismiss-sos-success" class="btn btn-secondary">Close</button>
                </div>
            </div>
        </div>
    </div> <!-- Alert Detail Modal -->
    <div id="alert-modal" class="modal-overlay hidden">
        <div class="modal-content alert-detail-panel">
            <div class="modal-header">
                <h2>Alert Details</h2>
                <button id="close-alert" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="alert-detail-body">
                <!-- Content injected dynamically -->
            </div>
            <div class="modal-actions" id="alert-modal-actions">
                <button class="btn btn-primary" id="btn-assign">Assign to Me</button>
                <button class="btn btn-success hidden" id="btn-resolve">Mark Resolved</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Application JS -->
    <script src="app.js"></script>
</body>
</html>
